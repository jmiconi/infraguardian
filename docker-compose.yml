  # Grafana visualization service
  # Provides dashboards for InfraGuardian metrics
  grafana:
    image: grafana/grafana
    container_name: ig-grafana
    restart: always

    ports:
      # Grafana web interface
      - "3000:3000"

    environment:
      # PostgreSQL datasource configuration
      POSTGRES_HOST: ig-postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      # Persistent Grafana storage
      - grafana_data:/var/lib/grafana

      # Provisioning configuration (datasources, dashboards)
      - ./grafana/provisioning:/etc/grafana/provisioning

      # Predefined dashboards
      - ./grafana/dashboards:/etc/grafana/dashboards

      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - infraguardian


# Internal Docker network for all InfraGuardian services
networks:
  infraguardian:
    driver: bridge


# Named volumes managed by Docker
volumes:
  grafana_data:
