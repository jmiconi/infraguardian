services:

  # PostgreSQL database service
  # Stores all collected metrics from InfraGuardian collectors
  postgres:
    image: postgres:16
    container_name: ig-postgres
    restart: always

    environment:
      # Database configuration loaded from .env
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      # Persistent database storage
      - ./db/data:/var/lib/postgresql/data

      # Initialization scripts executed only on first DB creation
      - ./db/init:/docker-entrypoint-initdb.d

      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

    ports:
      # Expose PostgreSQL to host for debugging or external access
      - "5432:5432"

    networks:
      - infraguardian

    healthcheck:
      # Ensures PostgreSQL is ready before dependent services start
      test: ["CMD-SHELL", "pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5



